<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Delete empty workspace?</title>
    <link rel="stylesheet" href="confirm-delete-workspace.css" />
  </head>
  <body>
    <main class="app">
      <h1>Workspace is empty</h1>
      <p id="message">Delete this workspace?</p>
      <div class="actions">
        <button id="keep-button" type="button">Keep workspace</button>
        <button id="delete-button" type="button">Delete workspace</button>
      </div>
    </main>
    <script src="confirm-delete-workspace.js"></script>
  </body>
</html>
