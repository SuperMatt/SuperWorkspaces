<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>New Workspace</title>
    <link rel="stylesheet" href="name-workspace.css" />
  </head>
  <body>
    <main class="app">
      <div class="hero">
        <div class="badge">W</div>
        <div>
          <h1>New workspace</h1>
          <p class="subtle">Selected tabs are already moved into this window.</p>
        </div>
      </div>
      <label for="workspace-name-input">Workspace name</label>
      <input id="workspace-name-input" type="text" />
      <p id="status" role="status" aria-live="polite"></p>
      <div class="actions">
        <button id="cancel-button" type="button">Cancel</button>
        <button id="confirm-button" type="button">Save name</button>
      </div>
    </main>
    <script src="name-workspace.js"></script>
  </body>
</html>
